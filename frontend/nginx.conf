server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to backend
    location /api/ {
        proxy_pass http://linkperu-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Known pages
    location = / { try_files /index.html =404; }
    location = /login { try_files /login/index.html =404; }
    location = /register { try_files /register/index.html =404; }
    location = /dashboard { try_files /dashboard/index.html =404; }
    location = /settings { try_files /settings/index.html =404; }

    # Everything else = profile page (slug)
    location / {
        try_files $uri $uri/index.html /404.html;
    }

    error_page 404 /404.html;
}
